version: "3.9"

services:
  # --- Next.js App (frontend + API routes) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vokasi2-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-vokasi2-dev-secret}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_API_URL=${APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vokasi2

  # --- Cron / Background Jobs ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vokasi2-worker
    restart: unless-stopped
    command: ["node", "worker.js", "award-badges"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vokasi2

  # --- PostgreSQL 15 + pgvector ---
  db:
    image: pgvector/pgvector:pg16
    container_name: vokasi2-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vokasi2
      - POSTGRES_USER=${DB_USER:-vokasi}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vokasi2secret}
    volumes:
      - vokasi2_db_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vokasi} -d vokasi2"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vokasi2

  # --- Redis (sessions, cache, queues) ---
  redis:
    image: redis:7-alpine
    container_name: vokasi2-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vokasi2_redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - vokasi2

  # --- Nginx Reverse Proxy + SSL ---
  nginx:
    image: nginx:alpine
    container_name: vokasi2-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
    networks:
      - vokasi2

  # --- Sandbox Containers (per student session) ---
  sandbox-runner:
    build:
      context: ./backend/sandbox
      dockerfile: Dockerfile
    container_name: vokasi2-sandbox-runner
    restart: "no"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - vokasi2_sandbox_data:/sandbox/data
    depends_on:
      - redis
    networks:
      - vokasi2
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

volumes:
  vokasi2_db_data:
  vokasi2_redis_data:
  vokasi2_sandbox_data:

networks:
  vokasi2:
    driver: bridge