# VOKASI2 — Docker Compose
# PRD v2.3 §8: PostgreSQL 15 + pgvector, Redis, Next.js API

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: vokasi2-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vokasi2
      POSTGRES_USER: vokasi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vokasi2_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - vokasi2_db:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vokasi -d vokasi2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vokasi2-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vokasi2_redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optional: CodeSandbox worker for cloud sandboxes
  sandbox-worker:
    build:
      context: ./backend/sandbox
      dockerfile: Dockerfile
    container_name: vokasi2-sandbox-worker
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      SANDBOX_TIMEOUT: 7200
    depends_on:
      redis:
        condition: service_healthy

  # Optional: SocraticChat streaming endpoint
  socratic-worker:
    build:
      context: ./backend/socratic
      dockerfile: Dockerfile
    container_name: vokasi2-socratic-worker
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  vokasi2_db:
  vokasi2_redis:
