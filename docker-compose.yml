version: '3.8'

services:
  backend:
    image: tsea-x-backend
    build: ./backend
    container_name: tsea-x-backend
    restart: always
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://tsea_user:TseaX_DB_Pass_2025!@cloud-sql-proxy:5432/tsea_x
    expose:
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app

  frontend:
    image: gcr.io/tsea-x-platform/tsea-x-frontend:latest
    container_name: tsea-x-frontend
    restart: always
    expose:
      - "3000"

  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
    container_name: cloud-sql-proxy
    command:
      - "--structured-logs"
      - "--port=5432"
      - "--address=0.0.0.0"
      - "tsea-x-platform:us-central1:tsea-x-db"
    ports:
      - "5432:5432"
    restart: always

volumes:
  caddy_data:
  caddy_config:
