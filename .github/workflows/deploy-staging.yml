name: VOKASI Deploy Staging

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/vokasi-backend:staging

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/vokasi-frontend:staging

  deploy-via-ssh:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.VOKASI_STG_SSH_HOST != '' && secrets.VOKASI_STG_SSH_USER != '' && secrets.VOKASI_STG_SSH_KEY != '' }}
    environment: staging
    steps:
      - name: Deploy to staging host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VOKASI_STG_SSH_HOST }}
          username: ${{ secrets.VOKASI_STG_SSH_USER }}
          key: ${{ secrets.VOKASI_STG_SSH_KEY }}
          script: |
            cd ${{ secrets.VOKASI_STG_APP_DIR }}
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d
